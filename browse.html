<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRZ Prehlad</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22252f;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --muted: #8b8fa3;
    --accent: #6c7ee1;
    --accent2: #e6a44e;
    --danger: #e15b5b;
    --success: #4ecb71;
    --info: #5bb8e1;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5; font-size: 13px;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
  }
  .topbar h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
  .topbar .stats { color: var(--muted); font-size: 12px; }
  .topbar .nav { margin-left: auto; display: flex; gap: 12px; }
  .topbar .nav a { color: var(--muted); font-size: 12px; }
  .topbar .nav a:hover { color: var(--text); }

  .layout { display: flex; min-height: calc(100vh - 49px); }

  .filters {
    width: 300px; min-width: 300px; background: var(--surface);
    border-right: 1px solid var(--border); padding: 16px;
    overflow-y: auto; height: calc(100vh - 49px); position: sticky; top: 49px;
  }
  .filters h2 { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .filter-section { margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
  .filter-section:last-child { border-bottom: none; }
  .filter-section h3 { font-size: 11px; font-weight: 600; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .filter-row { margin-bottom: 6px; }
  .filter-row label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .filter-row input, .filter-row select {
    width: 100%; padding: 5px 8px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-size: 12px; outline: none;
  }
  .filter-row input:focus, .filter-row select:focus { border-color: var(--accent); }
  .filter-row select { cursor: pointer; }
  .filter-row .range { display: flex; gap: 6px; }
  .filter-row .range input { width: 50%; }
  .filter-actions { display: flex; gap: 8px; margin-top: 12px; }
  .btn {
    padding: 6px 14px; border: none; border-radius: 4px; font-size: 12px;
    cursor: pointer; font-weight: 500;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: 0.9; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--border); }

  .main { flex: 1; overflow-x: auto; padding: 0; }

  .table-info {
    padding: 10px 16px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; font-size: 12px; color: var(--muted);
    position: sticky; top: 0; z-index: 10;
  }
  .table-info .count { font-weight: 600; color: var(--text); }
  .pagination { display: flex; gap: 4px; margin-left: auto; }
  .pagination button {
    padding: 4px 10px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-size: 11px; cursor: pointer;
  }
  .pagination button:hover { background: var(--border); }
  .pagination button:disabled { opacity: 0.3; cursor: default; }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th {
    background: var(--surface2); padding: 8px 10px; text-align: left; font-weight: 600;
    font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.03em;
    border-bottom: 2px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none;
  }
  th:hover { color: var(--text); }
  th.sorted-asc::after { content: " \u25B2"; color: var(--accent); }
  th.sorted-desc::after { content: " \u25BC"; color: var(--accent); }
  td {
    padding: 6px 10px; border-bottom: 1px solid var(--border);
    max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr:hover td { background: var(--surface2); }
  .tag {
    display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600;
  }
  .tag-zmluva { background: rgba(108,126,225,0.15); color: var(--accent); }
  .tag-dodatok { background: rgba(230,164,78,0.15); color: var(--accent2); }
  .tag-active { background: rgba(78,203,113,0.15); color: var(--success); }
  .tag-cancelled { background: rgba(225,91,91,0.15); color: var(--danger); }
  td.ext { color: var(--info); }

  .empty-state { padding: 60px 20px; text-align: center; color: var(--muted); }
  .empty-state p { font-size: 14px; margin-bottom: 8px; }
</style>
</head>
<body>

<div class="topbar">
  <h1>CRZ Prehlad</h1>
  <span class="stats" id="totalStats"></span>
  <div class="nav">
    <a href="/">Dashboard</a>
    <a href="/data">Datasette</a>
  </div>
</div>

<div class="layout">
  <aside class="filters" id="filtersPanel">
    <h2>Filtre</h2>

    <div class="filter-section">
      <h3>Zmluva</h3>
      <div class="filter-row">
        <label>Nazov zmluvy</label>
        <input type="text" data-filter="nazov_zmluvy" placeholder="hladat v nazve...">
      </div>
      <div class="filter-row">
        <label>Cislo zmluvy</label>
        <input type="text" data-filter="cislo_zmluvy" placeholder="cislo...">
      </div>
      <div class="filter-row">
        <label>Typ</label>
        <select data-filter="typ"><option value="">--</option><option value="zmluva">zmluva</option><option value="dodatok">dodatok</option></select>
      </div>
      <div class="filter-row">
        <label>Stav</label>
        <select data-filter="stav"><option value="">--</option><option value="aktívna">aktivna</option><option value="zrušená">zrusena</option></select>
      </div>
      <div class="filter-row">
        <label>Druh</label>
        <select data-filter="druh"><option value="">--</option><option value="zmluva">zmluva</option><option value="objednávka">objednavka</option></select>
      </div>
    </div>

    <div class="filter-section">
      <h3>Zmluvne strany</h3>
      <div class="filter-row">
        <label>Dodavatel</label>
        <input type="text" data-filter="dodavatel" placeholder="nazov dodavatela...">
      </div>
      <div class="filter-row">
        <label>Dodavatel ICO</label>
        <input type="text" data-filter="dodavatel_ico" placeholder="ICO...">
      </div>
      <div class="filter-row">
        <label>Objednavatel</label>
        <input type="text" data-filter="objednavatel" placeholder="nazov objednavatela...">
      </div>
      <div class="filter-row">
        <label>Objednavatel ICO</label>
        <input type="text" data-filter="objednavatel_ico" placeholder="ICO...">
      </div>
      <div class="filter-row">
        <label>Rezort</label>
        <select data-filter="rezort_id" id="rezortSelect"><option value="">--</option></select>
      </div>
    </div>

    <div class="filter-section">
      <h3>Sumy</h3>
      <div class="filter-row">
        <label>Suma (EUR)</label>
        <div class="range">
          <input type="number" data-filter="suma_min" placeholder="od">
          <input type="number" data-filter="suma_max" placeholder="do">
        </div>
      </div>
      <div class="filter-row">
        <label>Suma celkom (EUR)</label>
        <div class="range">
          <input type="number" data-filter="suma_celkom_min" placeholder="od">
          <input type="number" data-filter="suma_celkom_max" placeholder="do">
        </div>
      </div>
    </div>

    <div class="filter-section">
      <h3>Datumy</h3>
      <div class="filter-row">
        <label>Datum zverejnenia</label>
        <div class="range">
          <input type="date" data-filter="date_from">
          <input type="date" data-filter="date_to">
        </div>
      </div>
      <div class="filter-row">
        <label>Datum podpisu</label>
        <div class="range">
          <input type="date" data-filter="podpis_from">
          <input type="date" data-filter="podpis_to">
        </div>
      </div>
      <div class="filter-row">
        <label>Datum ucinnosti</label>
        <div class="range">
          <input type="date" data-filter="ucinnost_from">
          <input type="date" data-filter="ucinnost_to">
        </div>
      </div>
    </div>

    <div class="filter-section">
      <h3>Text</h3>
      <div class="filter-row">
        <label>Poznamka</label>
        <input type="text" data-filter="poznamka" placeholder="hladat v poznamke...">
      </div>
      <div class="filter-row">
        <label>Popis</label>
        <input type="text" data-filter="popis" placeholder="hladat v popise...">
      </div>
      <div class="filter-row">
        <label>Zdroj</label>
        <input type="text" data-filter="zdroj" placeholder="zdroj...">
      </div>
    </div>

    <div class="filter-section">
      <h3>Extrakcia (LLM)</h3>
      <div class="filter-row">
        <label>Kategoria sluzby</label>
        <select data-filter="service_category" id="categorySelect"><option value="">--</option></select>
      </div>
      <div class="filter-row">
        <label>Skutocny predmet</label>
        <input type="text" data-filter="actual_subject" placeholder="hladat...">
      </div>
      <div class="filter-row">
        <label>Asymetria pokut</label>
        <select data-filter="penalty_asymmetry">
          <option value="">--</option>
          <option value="strong_buyer_advantage">strong_buyer_advantage</option>
          <option value="moderate_buyer_advantage">moderate_buyer_advantage</option>
          <option value="balanced">balanced</option>
          <option value="supplier_advantage">supplier_advantage</option>
          <option value="none_found">none_found</option>
        </select>
      </div>
      <div class="filter-row">
        <label>Typ financovania</label>
        <select data-filter="funding_type" id="fundingSelect"><option value="">--</option></select>
      </div>
      <div class="filter-row">
        <label>Automaticke predlzenie</label>
        <select data-filter="auto_renewal"><option value="">--</option><option value="1">ano</option><option value="0">nie</option></select>
      </div>
      <div class="filter-row">
        <label>Bezodplatne</label>
        <select data-filter="bezodplatne"><option value="">--</option><option value="1">ano</option><option value="0">nie</option></select>
      </div>
      <div class="filter-row">
        <label>Skryte entity (min. pocet)</label>
        <input type="number" data-filter="hidden_entity_min" placeholder="min...">
      </div>
      <div class="filter-row">
        <label>Pocet pokut (min.)</label>
        <input type="number" data-filter="penalty_count_min" placeholder="min...">
      </div>
      <div class="filter-row">
        <label>Pocet IBAN (min.)</label>
        <input type="number" data-filter="iban_count_min" placeholder="min...">
      </div>
      <div class="filter-row">
        <label>Ma extrakciu</label>
        <select data-filter="has_extraction"><option value="">--</option><option value="1">ano</option><option value="0">nie</option></select>
      </div>
    </div>

    <div class="filter-section">
      <h3>Red Flags</h3>
      <div class="filter-row">
        <label>Flag typ</label>
        <select data-filter="flag" id="flagSelect"><option value="">--</option></select>
      </div>
      <div class="filter-row">
        <label>Ma aspon 1 flag</label>
        <select data-filter="has_flag"><option value="">--</option><option value="1">ano</option><option value="0">nie</option></select>
      </div>
    </div>

    <div class="filter-actions">
      <button class="btn btn-primary" onclick="applyFilters()">Hladat</button>
      <button class="btn btn-secondary" onclick="resetFilters()">Reset</button>
      <button class="btn btn-secondary" onclick="exportCSV()">CSV</button>
    </div>
  </aside>

  <div class="main">
    <div class="table-info" id="tableInfo">
      <span>Nacitavam...</span>
    </div>
    <div class="table-wrap">
      <table id="dataTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div id="emptyState" class="empty-state" style="display:none">
      <p>Ziadne vysledky pre zadane filtre.</p>
    </div>
  </div>
</div>

<script>
const COLUMNS = [
  { key: 'id', label: 'ID', type: 'num', on: true },
  { key: 'nazov_zmluvy', label: 'Nazov zmluvy', on: true },
  { key: 'cislo_zmluvy', label: 'Cislo', on: false },
  { key: 'dodavatel', label: 'Dodavatel', on: true },
  { key: 'dodavatel_ico', label: 'Dod. ICO', on: true },
  { key: 'dodavatel_adresa', label: 'Dod. adresa', on: false },
  { key: 'objednavatel', label: 'Objednavatel', on: true },
  { key: 'objednavatel_ico', label: 'Obj. ICO', on: true },
  { key: 'objednavatel_adresa', label: 'Obj. adresa', on: false },
  { key: 'suma', label: 'Suma', type: 'num', on: true },
  { key: 'suma_celkom', label: 'Suma celkom', type: 'num', on: false },
  { key: 'datum_zverejnenia', label: 'Zverejnenie', on: true },
  { key: 'datum_podpisu', label: 'Podpis', on: false },
  { key: 'datum_ucinnosti', label: 'Ucinnost', on: false },
  { key: 'platnost_do', label: 'Platnost do', on: false },
  { key: 'typ', label: 'Typ', on: true },
  { key: 'stav', label: 'Stav', on: true },
  { key: 'druh', label: 'Druh', on: false },
  { key: 'rezort', label: 'Rezort', on: true },
  { key: 'poznamka', label: 'Poznamka', on: false },
  { key: 'popis', label: 'Popis', on: false },
  { key: 'zdroj', label: 'Zdroj', on: false },
  { key: 'uvo_url', label: 'UVO', on: false },
  { key: 'crz_url', label: 'CRZ link', on: false },
  { key: 'service_category', label: 'Kategoria', ext: true, on: true },
  { key: 'actual_subject', label: 'Skutocny predmet', ext: true, on: false },
  { key: 'penalty_asymmetry', label: 'Pokuty asym.', ext: true, on: true },
  { key: 'auto_renewal', label: 'Auto-renew', ext: true, on: false },
  { key: 'bezodplatne', label: 'Bezodplatne', ext: true, on: false },
  { key: 'funding_type', label: 'Financovanie', ext: true, on: true },
  { key: 'grant_amount', label: 'Grant suma', ext: true, on: false },
  { key: 'hidden_entity_count', label: 'Skryte entity', ext: true, type: 'num', on: true },
  { key: 'penalty_count', label: 'Pocet pokut', ext: true, type: 'num', on: true },
  { key: 'iban_count', label: 'Pocet IBAN', ext: true, type: 'num', on: false },
  { key: 'flag_count', label: 'Flagy', type: 'num', on: true },
  { key: 'flag_labels', label: 'Flag typy', on: false },
];

let visibleCols = new Set(COLUMNS.filter(c => c.on).map(c => c.key));
let data = [];
let sortCol = 'datum_zverejnenia';
let sortDir = 'desc';
let page = 0;
const PAGE_SIZE = 100;
let totalCount = 0;

function esc(s) {
  if (s == null) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

// Store original URL params for prefill (before syncUrl can overwrite them)
var originalUrlParams = new URLSearchParams(window.location.search);

// Extra URL params that have no filter input (dashboard compat: suma_null, suma_gt, ico_missing etc.)
var extraParams = {};
(function() {
  var filterKeys = new Set();
  document.querySelectorAll('[data-filter]').forEach(function(el) {
    filterKeys.add(el.dataset.filter);
  });
  originalUrlParams.forEach(function(v, k) {
    if (!filterKeys.has(k) && k !== 'sort' && k !== 'sort_dir' && k !== 'offset' && k !== 'limit' && k !== 'format' && k !== 'page') {
      extraParams[k] = v;
    }
  });
  // Also read sort/page from URL
  if (originalUrlParams.get('sort')) sortCol = originalUrlParams.get('sort');
  if (originalUrlParams.get('sort_dir')) sortDir = originalUrlParams.get('sort_dir');
  if (originalUrlParams.get('page')) page = parseInt(originalUrlParams.get('page'), 10) || 0;
})();

function getFilterParams() {
  var params = new URLSearchParams();
  document.querySelectorAll('[data-filter]').forEach(function(el) {
    var v = el.value.trim();
    if (v) params.set(el.dataset.filter, v);
  });
  Object.keys(extraParams).forEach(function(k) { params.set(k, extraParams[k]); });
  params.set('sort', sortCol);
  params.set('sort_dir', sortDir);
  params.set('offset', String(page * PAGE_SIZE));
  params.set('limit', String(PAGE_SIZE));
  return params;
}

function syncUrl() {
  var params = new URLSearchParams();
  document.querySelectorAll('[data-filter]').forEach(function(el) {
    var v = el.value.trim();
    if (v) params.set(el.dataset.filter, v);
  });
  Object.keys(extraParams).forEach(function(k) { params.set(k, extraParams[k]); });
  if (sortCol !== 'datum_zverejnenia' || sortDir !== 'desc') {
    params.set('sort', sortCol);
    params.set('sort_dir', sortDir);
  }
  if (page > 0) params.set('page', String(page));
  var qs = params.toString();
  var newUrl = window.location.pathname + (qs ? '?' + qs : '');
  history.replaceState(null, '', newUrl);
}

function fetchData() {
  syncUrl();
  var params = getFilterParams();
  fetch('/api/browse?' + params.toString())
    .then(function(res) { return res.json(); })
    .then(function(json) {
      data = json.rows;
      totalCount = json.total;
      renderTable();
    });
}

function loadFilterOptions() {
  return fetch('/api/browse_filters')
    .then(function(res) { return res.json(); })
    .then(function(json) {
      var rezortSel = document.getElementById('rezortSelect');
      json.rezorty.forEach(function(r) {
        var o = document.createElement('option');
        o.value = r.id;
        o.textContent = r.nazov;
        rezortSel.appendChild(o);
      });
      var catSel = document.getElementById('categorySelect');
      json.categories.forEach(function(c) {
        var o = document.createElement('option');
        o.value = c;
        o.textContent = c;
        catSel.appendChild(o);
      });
      var fundSel = document.getElementById('fundingSelect');
      json.funding_types.forEach(function(f) {
        var o = document.createElement('option');
        o.value = f;
        o.textContent = f;
        fundSel.appendChild(o);
      });
      var flagSel = document.getElementById('flagSelect');
      json.flag_rules.forEach(function(f) {
        var o = document.createElement('option');
        o.value = f.id;
        o.textContent = f.label;
        flagSel.appendChild(o);
      });
    });
}

function formatNum(v) {
  if (v == null) return '';
  return Number(v).toLocaleString('sk-SK', { maximumFractionDigits: 2 });
}

function renderCell(col, row) {
  var v = row[col.key];
  var td = document.createElement('td');
  if (col.type === 'num') td.className = 'num';
  else if (col.ext) td.className = 'ext';

  if (col.key === 'id') {
    var a = document.createElement('a');
    a.href = '/browse/' + encodeURIComponent(v);
    a.target = '_blank';
    a.textContent = v;
    td.appendChild(a);
  } else if (col.key === 'crz_url' && v) {
    var a = document.createElement('a');
    a.href = v;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = 'CRZ';
    td.appendChild(a);
  } else if (col.key === 'uvo_url' && v && String(v).indexOf('http') === 0) {
    var a = document.createElement('a');
    a.href = v;
    a.target = '_blank';
    a.rel = 'noopener';
    a.textContent = 'UVO';
    td.appendChild(a);
  } else if (col.key === 'suma' || col.key === 'suma_celkom') {
    td.textContent = v != null ? formatNum(v) + ' EUR' : '';
  } else if (col.key === 'typ') {
    var span = document.createElement('span');
    span.className = 'tag ' + (v === 'dodatok' ? 'tag-dodatok' : 'tag-zmluva');
    span.textContent = v || '';
    td.appendChild(span);
  } else if (col.key === 'stav') {
    var span = document.createElement('span');
    span.className = 'tag ' + (v === 'zru\u0161en\u00e1' ? 'tag-cancelled' : 'tag-active');
    span.textContent = v || '';
    td.appendChild(span);
  } else if (col.key === 'auto_renewal' || col.key === 'bezodplatne') {
    td.textContent = v === 1 ? 'ano' : v === 0 ? 'nie' : '';
  } else if (col.type === 'num') {
    td.textContent = v != null ? formatNum(v) : '';
  } else {
    td.textContent = v != null ? String(v) : '';
    td.title = v != null ? String(v) : '';
  }
  return td;
}

function renderTable() {
  var cols = COLUMNS.filter(function(c) { return visibleCols.has(c.key); });
  var totalPages = Math.ceil(totalCount / PAGE_SIZE);
  var from = totalCount > 0 ? page * PAGE_SIZE + 1 : 0;
  var to = Math.min((page + 1) * PAGE_SIZE, totalCount);

  // Info bar
  var info = document.getElementById('tableInfo');
  info.textContent = '';
  var countSpan = document.createElement('span');
  var strong = document.createElement('strong');
  strong.textContent = totalCount.toLocaleString('sk-SK');
  countSpan.appendChild(strong);
  countSpan.appendChild(document.createTextNode(' zmluv'));
  info.appendChild(countSpan);

  var pageSpan = document.createElement('span');
  pageSpan.textContent = 'Strana ' + (page + 1) + ' z ' + (totalPages || 1) + ' (' + from + '-' + to + ')';
  info.appendChild(pageSpan);

  var pag = document.createElement('div');
  pag.className = 'pagination';
  [['\u00AB', 0], ['\u2039', page - 1], ['\u203A', page + 1], ['\u00BB', totalPages - 1]].forEach(function(pair, i) {
    var btn = document.createElement('button');
    btn.textContent = pair[0];
    var target = pair[1];
    if ((i < 2 && page <= 0) || (i >= 2 && page >= totalPages - 1)) btn.disabled = true;
    btn.addEventListener('click', function() { goPage(target); });
    pag.appendChild(btn);
  });
  info.appendChild(pag);

  document.getElementById('totalStats').textContent = totalCount.toLocaleString('sk-SK') + ' zmluv';

  // Header
  var thead = document.getElementById('tableHead');
  thead.textContent = '';
  var headerRow = document.createElement('tr');
  cols.forEach(function(c) {
    var th = document.createElement('th');
    th.textContent = c.label;
    if (c.key === sortCol) th.className = sortDir === 'asc' ? 'sorted-asc' : 'sorted-desc';
    th.addEventListener('click', function() { toggleSort(c.key); });
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);

  // Body
  var tbody = document.getElementById('tableBody');
  tbody.textContent = '';
  var emptyEl = document.getElementById('emptyState');

  if (!data.length) {
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  data.forEach(function(row) {
    var tr = document.createElement('tr');
    cols.forEach(function(c) {
      tr.appendChild(renderCell(c, row));
    });
    tbody.appendChild(tr);
  });
}

function toggleSort(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortCol = col;
    sortDir = 'desc';
  }
  page = 0;
  fetchData();
}

function goPage(p) {
  page = Math.max(0, p);
  fetchData();
}

function applyFilters() {
  page = 0;
  fetchData();
}

function resetFilters() {
  document.querySelectorAll('[data-filter]').forEach(function(el) {
    if (el.tagName === 'SELECT') el.selectedIndex = 0;
    else el.value = '';
  });
  extraParams = {};
  originalUrlParams = new URLSearchParams();
  page = 0;
  sortCol = 'datum_zverejnenia';
  sortDir = 'desc';
  fetchData();
}

function exportCSV() {
  var params = getFilterParams();
  params.set('limit', '10000');
  params.set('offset', '0');
  params.set('format', 'csv');
  window.open('/api/browse?' + params.toString(), '_blank');
}

document.getElementById('filtersPanel').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); applyFilters(); }
});

// Pre-fill filter inputs from the original URL params (not current URL, which syncUrl may have changed)
function prefillFromUrl() {
  originalUrlParams.forEach(function(value, key) {
    var el = document.querySelector('[data-filter="' + CSS.escape(key) + '"]');
    if (el) el.value = value;
  });
}

prefillFromUrl();
loadFilterOptions().then(function() {
  // Re-apply after select options are loaded so selects get their values
  prefillFromUrl();
  // Re-fetch with correct select values now applied
  fetchData();
});
fetchData();
</script>
</body>
</html>
