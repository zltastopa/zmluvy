services:
  app:
    build:
      context: .
    container_name: crz-explorer
    restart: unless-stopped
    environment:
      CRZ_DB_PATH: /data/crz.db
    ports:
      - "127.0.0.1:8321:8001"
    volumes:
      - ./crz.db:/data/crz.db
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python", "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/summary', timeout=5)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
