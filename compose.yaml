services:
  app:
    build:
      context: .
    container_name: crz-explorer
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8321:8002"
    volumes:
      - tables_cache:/app/delta_store/tables
      - ./data:/app/data
      - ./frontend:/app/frontend
      - ./assets:/app/assets
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python", "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/api/summary', timeout=5)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  tables_cache:
