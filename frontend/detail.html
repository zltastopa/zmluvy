<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zmluvy detail</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800;900&display=swap');

  :root {
    --black: #000000;
    --white: #ffffff;
    --yellow: #FFC400;
    --layout-max: 1280px;
    --canvas: #f3f3ef;
    --text: #111111;
    --muted: #5d5d5d;
    --danger: #bb3d3d;
    --success: #2f8b3e;
    --info: #1f1f1f;
    --warn: #9a6a00;
    --edge-soft: rgb(0 0 0 / 0.13);
    --card-radius: 24px;
    --shadow-soft: 0 12px 28px rgb(0 0 0 / 0.08), 0 3px 10px rgb(0 0 0 / 0.05);
    --shadow-lift: 0 18px 42px rgb(0 0 0 / 0.11), 0 5px 14px rgb(0 0 0 / 0.06);
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Lexend', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #f8f8f5 0%, var(--canvas) 100%);
    color: var(--text);
    line-height: 1.52;
    font-size: 14px;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    width: min(70vw, 980px);
    height: min(70vw, 980px);
    right: -24%;
    top: -48%;
    border-radius: 50%;
    background: var(--yellow);
    pointer-events: none;
    z-index: -3;
  }

  body::after {
    content: '';
    position: fixed;
    left: 2%;
    top: 118px;
    width: 82px;
    height: 82px;
    border-radius: 50%;
    background: var(--yellow);
    box-shadow: 162px 152px 0 -19px var(--yellow), 1220px 520px 0 -30px var(--yellow);
    pointer-events: none;
    z-index: -2;
  }

  a,
  a:visited {
    color: var(--text);
  }

  a:hover {
    text-decoration: underline;
    text-decoration-color: var(--yellow);
  }

  :focus-visible {
    outline: 3px solid var(--yellow);
    outline-offset: 2px;
    border-radius: 10px;
  }

  .topbar {
    position: sticky;
    top: 8px;
    z-index: 140;
    width: min(var(--layout-max), calc(100% - 1.8rem));
    min-height: 58px;
    margin: 8px auto 0;
    padding: 0.34rem 0.74rem;
    display: flex;
    align-items: center;
    gap: 0.52rem;
    border: 0;
    border-radius: 26px;
    background: rgb(255 255 255 / 0.8);
    box-shadow: var(--shadow-soft), inset 0 0 0 1px rgb(255 255 255 / 0.52);
    backdrop-filter: blur(8px);
    overflow: hidden;
  }

  .topbar .logo {
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    text-decoration: none;
    white-space: nowrap;
    font-size: 1.12rem;
    font-weight: 900;
    letter-spacing: -0.04em;
    color: var(--text);
    border-radius: 12px;
    padding: 0.14rem 0.24rem;
    line-height: 1;
  }

  .topbar .parent-crumb {
    display: inline-flex;
    align-items: center;
    gap: 0.26rem;
    color: var(--muted);
    font-size: 0.76rem;
    font-weight: 760;
    white-space: nowrap;
    margin-left: 0.1rem;
  }

  .topbar .parent-crumb a {
    color: var(--muted);
    text-decoration: none;
    border-bottom: 1px solid transparent;
  }

  .topbar .parent-crumb a:hover {
    color: var(--text);
    border-color: var(--yellow);
    text-decoration: none;
  }

  .topbar .logo .brand-mark {
    width: 40px;
    height: auto;
    display: block;
    object-fit: contain;
    mix-blend-mode: multiply;
  }

  .topbar .tabs {
    display: flex;
    align-items: center;
    gap: 0.2rem;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .topbar .tab {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    border-radius: 999px;
    border: 0;
    background: transparent;
    color: var(--text);
    padding: 0.44rem 0.68rem;
    font-size: 0.84rem;
    font-weight: 800;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: transform 170ms ease, background-color 170ms ease, color 170ms ease;
    text-decoration: none;
    white-space: nowrap;
  }

  .topbar .tab:hover {
    background: var(--yellow);
    transform: translateY(-1px);
    text-decoration: none;
  }

  .topbar .tab.active {
    background: var(--black);
    color: var(--white);
  }

  .topbar .tab-icon {
    width: 14px;
    height: 14px;
    display: inline-grid;
    place-items: center;
    line-height: 0;
    color: currentColor;
    flex: 0 0 auto;
  }

  .topbar .tab-icon svg {
    width: 14px;
    height: 14px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.9;
    stroke-linecap: round;
    stroke-linejoin: round;
    display: block;
  }

  .topbar .spacer {
    flex: 1;
  }

  .topbar .links {
    display: flex;
    gap: 0.4rem;
  }

  .topbar .links a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    border-radius: 999px;
    border: 0;
    background: var(--yellow);
    color: var(--black);
    font-size: 0.8rem;
    font-weight: 850;
    padding: 0.48rem 0.82rem;
    transition: transform 170ms ease, background-color 170ms ease, color 170ms ease;
  }

  .topbar .links a:hover {
    background: var(--black);
    color: var(--white);
    transform: translateY(-1px);
    text-decoration: none;
  }

  .container {
    width: min(var(--layout-max), calc(100% - 1.8rem));
    margin: 1rem auto 2.2rem;
  }

  .page-footer {
    width: min(var(--layout-max), calc(100% - 1.8rem));
    margin: 0 auto 1.4rem;
    display: flex;
    justify-content: flex-end;
  }

  .page-footer a {
    display: inline-flex;
    align-items: center;
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 780;
    border-radius: 999px;
    padding: 0.4rem 0.72rem;
    background: rgb(255 255 255 / 0.88);
    box-shadow: inset 0 0 0 1px rgb(0 0 0 / 0.12);
  }

  .page-footer a:hover {
    background: var(--yellow);
    text-decoration: none;
  }

  .contract-header {
    margin-bottom: 1rem;
    border-radius: 30px;
    background: var(--white);
    box-shadow: var(--shadow-lift);
    padding: 1.2rem 1.3rem;
    position: relative;
    overflow: hidden;
  }

  .contract-header::before {
    content: '';
    position: absolute;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    right: -154px;
    top: -170px;
    background: var(--yellow);
  }

  .contract-header::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    right: 118px;
    top: 22px;
    background: var(--yellow);
    box-shadow: -24px 16px 0 -4px var(--yellow);
  }

  .contract-header .id-line {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 0.45rem;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  .contract-header .contract-id {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 1.35rem;
    border-radius: 999px;
    padding: 0.12rem 0.52rem;
    font-size: 0.62rem;
    font-weight: 820;
    line-height: 1;
    box-shadow: inset 0 0 0 1px rgb(0 0 0 / 0.15);
  }

  .tag-zmluva {
    background: #f3f3f3;
    color: var(--text);
  }

  .tag-dodatok {
    background: #fff0bc;
    color: #5f4a00;
  }

  .tag-active {
    background: #e9f7e8;
    color: var(--success);
  }

  .tag-cancelled {
    background: #ffe3e3;
    color: var(--danger);
  }

  .contract-header h2 {
    font-size: clamp(1.52rem, 3vw, 2.4rem);
    font-weight: 900;
    line-height: 1.08;
    margin-bottom: 0.16rem;
    letter-spacing: -0.03em;
    position: relative;
    z-index: 1;
    max-width: 24ch;
  }

  .contract-subtitle {
    font-size: 0.9rem;
    font-weight: 620;
    margin-top: 0.26rem;
    color: var(--muted);
    position: relative;
    z-index: 1;
    max-width: 78ch;
  }

  .grid {
    display: grid;
    gap: 0.82rem;
    margin-bottom: 1rem;
  }

  .grid-2 {
    grid-template-columns: 1fr 1fr;
  }

  .grid-3 {
    grid-template-columns: 1fr 1fr 1fr;
  }

  .card {
    background: var(--white);
    border-radius: var(--card-radius);
    padding: 1rem;
    overflow: hidden;
    box-shadow: var(--shadow-soft);
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    right: -106px;
    top: -100px;
    background: rgb(255 196 0 / 0.2);
    pointer-events: none;
  }

  .card::after {
    content: '';
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    right: 14px;
    top: 14px;
    background: var(--yellow);
    pointer-events: none;
  }

  .card > * {
    position: relative;
    z-index: 1;
  }

  .card-header {
    font-size: 0.66rem;
    font-weight: 820;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 0.66rem;
  }

  .card-accent::after {
    background: var(--black);
  }

  .card-warn::after {
    background: #c58b00;
  }

  .card-danger::after {
    background: var(--danger);
  }

  .card-info::after {
    background: #4b4b4b;
  }

  .card-success::after {
    background: var(--success);
  }

  .kv {
    margin-bottom: 0.55rem;
  }

  .kv:last-child {
    margin-bottom: 0;
  }

  .kv-label {
    font-size: 0.64rem;
    color: var(--muted);
    font-weight: 780;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 0.14rem;
  }

  .kv-value {
    font-size: 0.86rem;
    word-break: break-word;
    font-weight: 520;
  }

  .kv-value.large {
    font-size: 1.45rem;
    font-weight: 860;
    letter-spacing: -0.02em;
  }

  .kv-value.mono {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.78rem;
  }

  .kv-value a {
    color: var(--text);
    text-decoration: underline;
    text-decoration-color: rgb(255 196 0 / 0.9);
  }

  .entity-name {
    font-size: 1.05rem;
    font-weight: 760;
    margin-bottom: 0.16rem;
  }

  .entity-ico {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.8rem;
    color: #4e4e4e;
    text-decoration: none;
  }

  .entity-address {
    font-size: 0.76rem;
    color: var(--muted);
    margin-top: 0.24rem;
  }

  .tax-tag {
    margin-top: 0.45rem;
  }

  .ruz-info {
    margin-top: 0.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
  }

  .flag-list {
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }

  .flag-item {
    display: flex;
    align-items: flex-start;
    gap: 0.62rem;
    padding: 0.62rem 0.74rem;
    border-radius: 14px;
    background: #fbfbf8;
    box-shadow: inset 0 0 0 1px rgb(0 0 0 / 0.1);
  }

  .flag-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
  }

  .flag-dot.danger {
    background: var(--danger);
  }

  .flag-dot.warning {
    background: #cc9300;
  }

  .flag-dot.info {
    background: #5f5f5f;
  }

  .flag-label {
    font-weight: 760;
    font-size: 0.84rem;
  }

  .flag-desc {
    font-size: 0.76rem;
    color: var(--muted);
    line-height: 1.45;
  }

  .mini-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.76rem;
    overflow: hidden;
    border-radius: 16px;
  }

  .mini-table th {
    text-align: left;
    font-size: 0.64rem;
    font-weight: 760;
    text-transform: uppercase;
    color: #444;
    padding: 0.5rem 0.54rem;
    background: #f4f4ef;
    border-bottom: 1px solid rgb(0 0 0 / 0.11);
    letter-spacing: 0.08em;
  }

  .mini-table td {
    padding: 0.5rem 0.54rem;
    border-bottom: 1px solid rgb(0 0 0 / 0.08);
    background: rgb(255 255 255 / 0.9);
  }

  .mini-table tr:last-child td {
    border-bottom: none;
  }

  .mini-table tr:hover td {
    background: #fff4cd;
  }

  td.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .item-card {
    background: #fbfbf8;
    border-radius: 14px;
    padding: 0.58rem 0.72rem;
    margin-bottom: 0.46rem;
    box-shadow: inset 0 0 0 1px rgb(0 0 0 / 0.1);
  }

  .item-card:last-child {
    margin-bottom: 0;
  }

  .item-card .item-name {
    font-weight: 720;
    font-size: 0.82rem;
    display: block;
    text-decoration: none;
  }

  .item-card .item-meta {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.14rem;
  }

  .item-card .item-detail {
    font-size: 0.74rem;
    margin-top: 0.2rem;
    color: #333;
  }

  .stat-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 0.68rem;
    margin-bottom: 1rem;
  }

  .stat-block {
    background: var(--white);
    border-radius: 20px;
    padding: 0.88rem;
    text-align: center;
    box-shadow: var(--shadow-soft);
    position: relative;
    overflow: hidden;
  }

  .stat-block::after {
    content: '';
    position: absolute;
    width: 98px;
    height: 98px;
    border-radius: 50%;
    right: -68px;
    top: -66px;
    background: rgb(255 196 0 / 0.25);
  }

  .stat-block .stat-value {
    font-size: 1.45rem;
    font-weight: 860;
    letter-spacing: -0.03em;
    position: relative;
    z-index: 1;
  }

  .stat-block .stat-label {
    font-size: 0.66rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 720;
    margin-top: 0.2rem;
    position: relative;
    z-index: 1;
  }

  .stat-block.accent .stat-value {
    color: var(--black);
  }

  .stat-block.warn .stat-value {
    color: var(--warn);
  }

  .stat-block.danger .stat-value {
    color: var(--danger);
  }

  .stat-block.info .stat-value {
    color: #3e3e3e;
  }

  .stat-block.success .stat-value {
    color: var(--success);
  }

  .empty {
    color: var(--muted);
    font-style: italic;
    font-size: 0.84rem;
  }

  .section-title {
    font-size: clamp(1.1rem, 2.5vw, 1.5rem);
    font-weight: 860;
    margin-bottom: 0.58rem;
    margin-top: 0.3rem;
    letter-spacing: -0.03em;
  }

  .loading,
  .error-state {
    background: var(--white);
    border-radius: 24px;
    box-shadow: var(--shadow-soft);
    padding: 2.8rem 1rem;
    text-align: center;
    color: var(--muted);
    font-size: 1rem;
  }

  .error-state h2 {
    font-size: 1.4rem;
    margin-bottom: 0.4rem;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .error-state p {
    color: var(--muted);
  }

  @media (max-width: 980px) {
    .topbar {
      min-height: 64px;
      height: auto;
      border-radius: 22px;
      flex-wrap: wrap;
      top: 6px;
      padding: 0.42rem 0.6rem;
      gap: 0.36rem;
    }

    .topbar .tabs {
      order: 3;
      width: 100%;
    }

    .topbar .logo .brand-mark {
      width: 36px;
    }

    .container {
      width: min(var(--layout-max), calc(100% - 1rem));
    }

    .grid-2,
    .grid-3 {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 740px) {
    .topbar .parent-crumb {
      display: none;
    }

    .topbar .logo span {
      display: none;
    }

    .topbar .tabs {
      gap: 0.12rem;
      justify-content: space-between;
    }

    .topbar .tab-icon {
      display: none;
    }

    .topbar .tab {
      font-size: 0.74rem;
      padding: 0.4rem 0.46rem;
    }

    .contract-header {
      border-radius: 22px;
      padding: 0.9rem;
    }

    .contract-header h2 {
      font-size: clamp(1.3rem, 7.2vw, 1.9rem);
    }

    .section-title {
      margin-top: 0.15rem;
    }

    .stat-row {
      grid-template-columns: 1fr;
    }
  }

  /* Floating bug report button */
  .bug-fab {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.7rem 1.2rem;
    background: var(--black);
    color: var(--yellow);
    font-family: 'Lexend', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 0.01em;
    border: 2px solid var(--yellow);
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 18px 40px rgb(0 0 0 / 0.11), 0 5px 14px rgb(0 0 0 / 0.06);
    transition: all 0.2s ease;
    text-decoration: none;
  }
  .bug-fab:hover {
    background: var(--yellow);
    color: var(--black);
    transform: translateY(-2px);
    box-shadow: 0 20px 44px rgb(0 0 0 / 0.15), 0 6px 16px rgb(0 0 0 / 0.08);
  }
  .bug-fab:active {
    transform: translateY(0);
  }
  .bug-fab svg {
    width: 16px;
    height: 16px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }

  @media (max-width: 740px) {
    .bug-fab {
      bottom: 1rem;
      right: 1rem;
      padding: 0.6rem 1rem;
      font-size: 0.76rem;
    }
  }
</style>

<div class="topbar">
  <a class="logo" href="/" aria-label="Zmluvy">
    <img class="brand-mark" src="/assets/zltastopa.png" alt="Žltá Stopa">
    <span class="brand-copy">
      <span class="product-meta">CRZ bez balastu.</span>
      <span class="product-name">Zmluvy</span>
    </span>
  </a>
  <div class="tabs">
    <a class="tab" href="/">
      <span class="tab-icon" aria-hidden="true">
        <svg viewBox="0 0 16 16"><path d="M3 4.5h10M3 8h10M3 11.5h10"/></svg>
      </span>
      Prehľad
    </a>
    <a class="tab active" href="/browse">
      <span class="tab-icon" aria-hidden="true">
        <svg viewBox="0 0 16 16"><rect x="2.5" y="2.5" width="4.5" height="4.5" rx="0.8"/><rect x="9" y="2.5" width="4.5" height="4.5" rx="0.8"/><rect x="2.5" y="9" width="4.5" height="4.5" rx="0.8"/><rect x="9" y="9" width="4.5" height="4.5" rx="0.8"/></svg>
      </span>
      Zoznam
    </a>
    <a class="tab" href="/search">
      <span class="tab-icon" aria-hidden="true">
        <svg viewBox="0 0 16 16"><circle cx="7" cy="7" r="3.8"/><path d="M10 10l3.5 3.5"/></svg>

    </a>
    <a class="tab" href="/methodology">
      <span class="tab-icon" aria-hidden="true">
        <svg viewBox="0 0 16 16"><path d="M8 2.5l5.3 9.3H2.7L8 2.5z"/><path d="M8 6.3v2.8M8 10.9h.01"/></svg>
      </span>
      Metodika
    </a>
    <a class="tab tab-link" href="/data">
      <span class="tab-icon" aria-hidden="true">
        <svg viewBox="0 0 16 16"><ellipse cx="8" cy="3.4" rx="3.8" ry="1.8"/><path d="M4.2 3.4v4.6c0 1 1.7 1.8 3.8 1.8s3.8-.8 3.8-1.8V3.4"/><path d="M4.2 8v4.6c0 1 1.7 1.8 3.8 1.8s3.8-.8 3.8-1.8V8"/></svg>
      </span>
      Datasette
    </a>

  <div class="loading" id="loadingState">Načítavam zmluvu...</div>

    <span class="footer-logo" aria-hidden="true">

    </span>
    <span class="footer-text">Projekt Žltá Stopa</span>
    <span class="footer-arrow" aria-hidden="true">
      <svg viewBox="0 0 16 16"><path d="M5 11L11 5"/><path d="M7 5H11V9"/></svg>
    </span>
  </a>
</footer>

<script>
function esc(s) {
  if (s == null) return '';
  var d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function formatNum(v) {
  if (v == null) return '';
  return Number(v).toLocaleString('sk-SK', { maximumFractionDigits: 2 });
}

function formatEur(v) {
  if (v == null) return '-';
  return formatNum(v) + ' EUR';
}

function formatDate(v) {
  if (!v) return '-';
  return String(v).substring(0, 10);
}

function getContractId() {
  var parts = window.location.pathname.split('/');
  return parts[parts.length - 1];
}

function el(tag, cls, children) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (typeof children === 'string') e.textContent = children;
  else if (Array.isArray(children)) children.forEach(function(c) { if (c) e.appendChild(c); });
  else if (children instanceof Node) e.appendChild(children);
  return e;
}

function elHTML(tag, cls, html) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  // Only used with pre-escaped content
  return e;
}

function kv(label, value, cls) {
  var d = el('div', 'kv');
  d.appendChild(el('div', 'kv-label', label));
  var vEl = el('div', 'kv-value' + (cls ? ' ' + cls : ''));
  if (value instanceof Node) vEl.appendChild(value);
  else vEl.textContent = value != null ? String(value) : '-';
  d.appendChild(vEl);
  return d;
}

function kvLink(label, text, href) {
  var d = el('div', 'kv');
  d.appendChild(el('div', 'kv-label', label));
  var vEl = el('div', 'kv-value');
  if (href) {
    var a = el('a', null, text);
    a.href = href;
    a.target = '_blank';
    a.rel = 'noopener';
    vEl.appendChild(a);
  } else {
    vEl.textContent = '-';
  }
  d.appendChild(vEl);
  return d;
}

function card(headerText, accentClass, children) {
  var c = el('div', 'card' + (accentClass ? ' ' + accentClass : ''));
  if (headerText) c.appendChild(el('div', 'card-header', headerText));
  if (Array.isArray(children)) children.forEach(function(ch) { if (ch) c.appendChild(ch); });
  else if (children instanceof Node) c.appendChild(children);
  return c;
}

function renderDetail(result) {
  var container = document.getElementById('content');
  container.textContent = '';

  if (result.error) {
    var err = el('div', 'error-state');
    err.appendChild(el('h2', null, 'Zmluva nenájdená'));
    err.appendChild(el('p', null, 'ID ' + getContractId() + ' neexistuje v databáze.'));
    container.appendChild(err);
    return;
  }

  var d = result.data;
  var extraction = null;
  var ej = null;
  if (d.extraction) {
    extraction = d.extraction;
    if (extraction.extraction_json) {
      try { ej = JSON.parse(extraction.extraction_json); } catch(e) {}
    }
  }

  // Title
  var displayName = (extraction && extraction.actual_subject) || d.nazov_zmluvy || '';
  document.title = 'Zmluvy #' + d.id + ' - ' + displayName;

  // Header
  var header = el('div', 'contract-header');
  var idLine = el('div', 'id-line');
  idLine.appendChild(el('span', 'contract-id', '#' + d.id));
  var typValue = (d.typ || '').trim();
  var druhValue = (d.druh || '').trim();
  var typTag = el('span', 'tag ' + (typValue === 'dodatok' ? 'tag-dodatok' : 'tag-zmluva'), typValue || '');
  idLine.appendChild(typTag);
  var stavTag = el('span', 'tag ' + (d.stav === 'zru\u0161en\u00e1' ? 'tag-cancelled' : 'tag-active'), d.stav || '');
  idLine.appendChild(stavTag);
  if (druhValue && druhValue !== '0' && druhValue.toLowerCase() !== typValue.toLowerCase()) {
    idLine.appendChild(el('span', 'tag', druhValue));
  }
  header.appendChild(idLine);
  if (extraction && extraction.actual_subject && d.nazov_zmluvy && extraction.actual_subject !== d.nazov_zmluvy) {
    header.appendChild(el('div', 'contract-title-kicker', 'Extrahovaný názov'));
  }
  header.appendChild(el('h2', null, displayName || 'Bez názvu'));
  if (extraction && extraction.actual_subject && d.nazov_zmluvy && extraction.actual_subject !== d.nazov_zmluvy) {
    var sub = el('div', 'contract-subtitle');
    sub.appendChild(el('div', 'contract-subtitle-label', 'Pôvodný názov v CRZ'));
    sub.appendChild(el('div', 'contract-subtitle-value', d.nazov_zmluvy));
    header.appendChild(sub);
  }
  container.appendChild(header);

  // Stat blocks
  var stats = el('div', 'stat-row');
  var s1 = el('div', 'stat-block accent');
  s1.appendChild(el('div', 'stat-value', formatEur(d.suma)));
  s1.appendChild(el('div', 'stat-label', 'Suma'));
  stats.appendChild(s1);
  var s2 = el('div', 'stat-block info');
  s2.appendChild(el('div', 'stat-value', formatEur(d.suma_celkom)));
  s2.appendChild(el('div', 'stat-label', 'Suma celkom'));
  stats.appendChild(s2);
  var s3 = el('div', 'stat-block');
  s3.appendChild(el('div', 'stat-value', formatDate(d.datum_zverejnenia)));
  s3.appendChild(el('div', 'stat-label', 'Zverejnené'));
  stats.appendChild(s3);
  if (d.red_flags && d.red_flags.length > 0) {
    var s4 = el('div', 'stat-block signal');
    s4.appendChild(el('div', 'stat-value', String(d.red_flags.length)));
    s4.appendChild(el('div', 'stat-label', 'Žlté stopy'));
    stats.appendChild(s4);
  }
  if (extraction) {
    var s5 = el('div', 'stat-block warn');
    s5.appendChild(el('div', 'stat-value', String(extraction.hidden_entity_count || 0)));
    s5.appendChild(el('div', 'stat-label', 'Skryté entity'));
    stats.appendChild(s5);
  }
  container.appendChild(stats);

  // Red flags
  if (d.red_flags && d.red_flags.length > 0) {
    container.appendChild(el('div', 'section-title', 'Žlté stopy'));
    var flagCard = card(null, 'card-signal');
    var flagList = el('div', 'flag-list');
    d.red_flags.forEach(function(f) {
      var item = el('div', 'flag-item');
      item.appendChild(el('div', 'flag-dot ' + (f.severity || 'info')));
      var body = el('div');
      body.appendChild(el('div', 'flag-label', f.label));
      if (f.description) body.appendChild(el('div', 'flag-desc', f.description));
      if (f.detail) body.appendChild(el('div', 'flag-desc', f.detail));
      item.appendChild(body);
      flagList.appendChild(item);
    });
    flagCard.appendChild(flagList);
    container.appendChild(flagCard);
  }

  // Parties grid
  container.appendChild(el('div', 'section-title', 'Zmluvné strany'));
  var partiesGrid = el('div', 'grid grid-2');

  // Dodávateľ
  var dodCard = card('Dodávateľ', 'card-accent');
  dodCard.appendChild(el('div', 'entity-name', d.dodavatel || '-'));
  if (d.dodavatel_ico && d.dodavatel_ico !== '-') {
    var icoLink = el('a', 'entity-ico');
    icoLink.textContent = 'IČO: ' + d.dodavatel_ico;
    icoLink.href = '/browse?dodavatel_ico=' + encodeURIComponent(d.dodavatel_ico);
    dodCard.appendChild(icoLink);
  }
  if (d.dodavatel_adresa) dodCard.appendChild(el('div', 'entity-address', d.dodavatel_adresa));
  if (d.dodavatel_tax_status) {
    var taxCls = d.dodavatel_tax_status === 'vysoko spoľahlivý' ? 'tag-active' :
                 d.dodavatel_tax_status === 'spoľahlivý' ? 'tag-zmluva' : 'tag-cancelled';
    dodCard.appendChild(el('span', 'tag ' + taxCls + ' tax-tag', d.dodavatel_tax_status));
  }
  if (d.dodavatel_vszp_debt) {
    var vszpTag = el('span', 'tag tag-cancelled tax-tag',
      'Dlžník VSZP: ' + Number(d.dodavatel_vszp_debt.amount).toLocaleString('sk-SK', {maximumFractionDigits: 2}) + ' EUR');
    dodCard.appendChild(vszpTag);
  }
  if (d.dodavatel_socpoist_debt) {
    var spTag = el('span', 'tag tag-cancelled tax-tag',
      'Dlžník Soc. poist.: ' + Number(d.dodavatel_socpoist_debt.amount).toLocaleString('sk-SK', {maximumFractionDigits: 2}) + ' EUR');
    dodCard.appendChild(spTag);
  }
  if (d.dodavatel_ruz) {
    var ruz = d.dodavatel_ruz;
    var ruzInfo = el('div', 'ruz-info');
    ruzInfo.style.marginTop = '8px';
    ruzInfo.style.fontSize = '0.85em';
    ruzInfo.style.color = '#888';
    var parts = [];
    if (ruz.legal_form) parts.push(ruz.legal_form);
    if (ruz.organization_size) parts.push(ruz.organization_size);
    if (ruz.established_on) parts.push('vznik: ' + ruz.established_on);
    if (ruz.nace_category) parts.push('NACE: ' + ruz.nace_category);
    if (ruz.region) parts.push(ruz.region);
    if (parts.length) ruzInfo.textContent = parts.join(' | ');
    if (parts.length) dodCard.appendChild(ruzInfo);
    if (ruz.terminated_on) {
      dodCard.appendChild(el('span', 'tag tag-cancelled tax-tag', 'Zrušená firma: ' + ruz.terminated_on));
    }
  }
  partiesGrid.appendChild(dodCard);

  // Objednávateľ
  var objCard = card('Objednávateľ', 'card-info');
  objCard.appendChild(el('div', 'entity-name', d.objednavatel || '-'));
  if (d.objednavatel_ico) {
    var icoLink2 = el('a', 'entity-ico');
    icoLink2.textContent = 'IČO: ' + d.objednavatel_ico;
    icoLink2.href = '/browse?objednavatel_ico=' + encodeURIComponent(d.objednavatel_ico);
    objCard.appendChild(icoLink2);
  }
  if (d.objednavatel_adresa) objCard.appendChild(el('div', 'entity-address', d.objednavatel_adresa));
  if (d.objednavatel_tax_status) {
    var taxCls2 = d.objednavatel_tax_status === 'vysoko spoľahlivý' ? 'tag-active' :
                  d.objednavatel_tax_status === 'spoľahlivý' ? 'tag-zmluva' : 'tag-cancelled';
    objCard.appendChild(el('span', 'tag ' + taxCls2 + ' tax-tag', d.objednavatel_tax_status));
  }
  partiesGrid.appendChild(objCard);
  container.appendChild(partiesGrid);

  // Hidden entities (includes subcontractors)
  if (ej && ej.hidden_entities && ej.hidden_entities.length > 0) {
    container.appendChild(el('div', 'section-title', 'Skryté entity (' + ej.hidden_entities.length + ')'));
    var heCard = card(null, 'card-warn');
    var maxPctVal = extraction ? parseFloat(extraction.subcontractor_max_percentage) : NaN;
    var maxPctStr = (maxPctVal > 0 && maxPctVal <= 100) ? maxPctVal.toFixed(1) + '%' : null;
    ej.hidden_entities.forEach(function(he) {
      var ic = el('div', 'item-card');
      var nameEl;
      if (he.ico) {
        nameEl = el('a', 'item-name', he.name || '-');
        nameEl.href = '/browse?dodavatel_ico=' + encodeURIComponent(he.ico);
      } else if (he.name) {
        nameEl = el('a', 'item-name', he.name);
        nameEl.href = '/browse?dodavatel=' + encodeURIComponent(he.name);
      } else {
        nameEl = el('div', 'item-name', '-');
      }
      ic.appendChild(nameEl);
      var metaParts = [];
      if (he.ico) metaParts.push('IČO: ' + he.ico);
      if (he.role) metaParts.push('Rola: ' + he.role);
      if (he.role === 'subcontractor' && maxPctStr) metaParts.push('Max. podiel: ' + maxPctStr);
      if (metaParts.length) ic.appendChild(el('div', 'item-meta', metaParts.join('  |  ')));
      heCard.appendChild(ic);
    });
    container.appendChild(heCard);
  }

  // Signatories (right after hidden entities)
  if (ej && ej.signatories && ej.signatories.length > 0) {
    container.appendChild(el('div', 'section-title', 'Podpisujúci (' + ej.signatories.length + ')'));
    var sigGrid = el('div', 'grid grid-2');
    var buyerSigs = ej.signatories.filter(function(s) { return s.party === 'buyer'; });
    var supplierSigs = ej.signatories.filter(function(s) { return s.party !== 'buyer'; });

    if (supplierSigs.length > 0) {
      var sCard = card('Dodávateľ', 'card-accent');
      supplierSigs.forEach(function(s) {
        var ic = el('div', 'item-card');
        if (s.name) {
          var nameLink = el('a', 'item-name', s.name);
          nameLink.href = 'https://www.foaf.sk/search?searchString=' + encodeURIComponent(s.name);
          nameLink.target = '_blank';
          nameLink.rel = 'noopener';
          ic.appendChild(nameLink);
        } else {
          ic.appendChild(el('div', 'item-name', '-'));
        }
        var meta = [];
        if (s.role) meta.push(s.role);
        if (s.delegation) meta.push(s.delegation);
        if (meta.length) ic.appendChild(el('div', 'item-meta', meta.join('  |  ')));
        sCard.appendChild(ic);
      });
      sigGrid.appendChild(sCard);
    }

    if (buyerSigs.length > 0) {
      var bCard = card('Objednávateľ', 'card-info');
      buyerSigs.forEach(function(s) {
        var ic = el('div', 'item-card');
        if (s.name) {
          var nameLink2 = el('a', 'item-name', s.name);
          nameLink2.href = 'https://www.foaf.sk/search?searchString=' + encodeURIComponent(s.name);
          nameLink2.target = '_blank';
          nameLink2.rel = 'noopener';
          ic.appendChild(nameLink2);
        } else {
          ic.appendChild(el('div', 'item-name', '-'));
        }
        var meta = [];
        if (s.role) meta.push(s.role);
        if (s.delegation) meta.push(s.delegation);
        if (meta.length) ic.appendChild(el('div', 'item-meta', meta.join('  |  ')));
        bCard.appendChild(ic);
      });
      sigGrid.appendChild(bCard);
    }

    container.appendChild(sigGrid);
  }

  // Extraction section
  if (extraction) {
    container.appendChild(el('div', 'section-title', 'LLM Extrakcia'));

    var extGrid = el('div', 'grid grid-2');

    // Classification
    var classCard = card('Klasifikácia', 'card-info');
    classCard.appendChild(kv('Kategória služby', extraction.service_category || '-'));
    classCard.appendChild(kv('Skutočný predmet', extraction.actual_subject || '-'));
    classCard.appendChild(kv('Typ financovania', extraction.funding_type || '-'));
    if (extraction.grant_amount) classCard.appendChild(kv('Grantová suma', extraction.grant_amount));
    classCard.appendChild(kv('Bezodplatné', extraction.bezodplatne ? 'Áno' : 'Nie'));
    classCard.appendChild(kv('Automatické predĺženie', extraction.auto_renewal ? 'Áno' : 'Nie'));
    classCard.appendChild(kv('Model', extraction.model || '-', 'mono'));
    extGrid.appendChild(classCard);

    // Penalties card
    var penCard = card('Pokuty & asymetria', extraction.penalty_asymmetry === 'supplier_advantage' ? 'card-danger' : 'card-warn');
    penCard.appendChild(kv('Asymetria pokut', extraction.penalty_asymmetry || '-'));
    penCard.appendChild(kv('Počet pokút', String(extraction.penalty_count || 0)));
    if (ej && ej.penalties && ej.penalties.length > 0) {
      var penSep = el('div', 'kv-label', 'Detail pokut');
      penSep.style.marginTop = '12px';
      penSep.style.marginBottom = '8px';
      penCard.appendChild(penSep);
      ej.penalties.forEach(function(p) {
        var ic = el('div', 'item-card');
        ic.appendChild(el('div', 'item-name', (p.penalized_party === 'buyer' ? 'Objednávateľ' : p.penalized_party === 'supplier' ? 'Dodávateľ' : p.penalized_party || '-')));
        if (p.trigger) ic.appendChild(el('div', 'item-detail', 'Dôvod: ' + p.trigger));
        if (p.amount) ic.appendChild(el('div', 'item-meta', 'Suma/sadzba: ' + p.amount));
        penCard.appendChild(ic);
      });
    }
    extGrid.appendChild(penCard);

    container.appendChild(extGrid);

    // Termination
    if (ej && ej.termination) {
      var t = ej.termination;
      var termCard = card('Ukončenie zmluvy', null);
      termCard.appendChild(kv('Objednávateľ môže ukončiť bez dôvodu', t.buyer_can_terminate_without_cause ? 'Áno' : 'Nie'));
      termCard.appendChild(kv('Dodávateľ môže ukončiť bez dôvodu', t.supplier_can_terminate_without_cause ? 'Áno' : 'Nie'));
      termCard.appendChild(kv('Výpovedná lehota', t.notice_period || '-'));
      container.appendChild(termCard);
    }

    // Bank accounts
    if (ej && ej.bank_accounts && ej.bank_accounts.length > 0) {
      container.appendChild(el('div', 'section-title', 'Bankové účty (' + ej.bank_accounts.length + ')'));
      var baCard = card(null, null);
      var baTable = el('table', 'mini-table');
      var baHead = document.createElement('thead');
      var baHr = document.createElement('tr');
      ['Strana', 'IBAN'].forEach(function(h) { baHr.appendChild(el('th', null, h)); });
      baHead.appendChild(baHr);
      baTable.appendChild(baHead);
      var baBody = document.createElement('tbody');
      ej.bank_accounts.forEach(function(ba) {
        var tr = document.createElement('tr');
        tr.appendChild(el('td', null, ba.party === 'buyer' ? 'Objednávateľ' : ba.party === 'supplier' ? 'Dodávateľ' : (ba.party || '-')));
        tr.appendChild(el('td', 'mono', ba.iban || '-'));
        baBody.appendChild(tr);
      });
      baTable.appendChild(baBody);
      baCard.appendChild(baTable);
      container.appendChild(baCard);
    }

    // Funding source detail
    if (ej && ej.funding_source && (ej.funding_source.scheme_reference || ej.funding_source.grant_amount)) {
      var fsCard = card('Financovanie - detail', 'card-success');
      fsCard.appendChild(kv('Typ', ej.funding_source.type || '-'));
      if (ej.funding_source.scheme_reference) fsCard.appendChild(kv('Schéma/referencia', ej.funding_source.scheme_reference));
      if (ej.funding_source.grant_amount) fsCard.appendChild(kv('Suma grantu', ej.funding_source.grant_amount));
      if (ej && ej.bank_accounts && ej.bank_accounts.length > 0) fsCard.style.marginTop = '0.82rem';
      container.appendChild(fsCard);
    }
  } else {
    container.appendChild(el('div', 'section-title', 'LLM Extrakcia'));
    container.appendChild(el('div', 'empty', 'Pre túto zmluvu nie je dostupná LLM extrakcia.'));
  }

  // Dates + details grid
  container.appendChild(el('div', 'section-title', 'Detaily zmluvy'));
  var detailGrid = el('div', 'grid grid-2');

  var datesCard = card('Dátumy', 'card-accent');
  datesCard.appendChild(kv('Dátum zverejnenia', d.datum_zverejnenia || '-'));
  datesCard.appendChild(kv('Dátum podpisu', d.datum_podpisu || '-'));
  datesCard.appendChild(kv('Dátum účinnosti', d.datum_ucinnosti || '-'));
  datesCard.appendChild(kv('Platnosť do', d.platnost_do || '-'));
  detailGrid.appendChild(datesCard);

  var metaCard = card('Metadata', null);
  metaCard.appendChild(kv('Číslo zmluvy', d.cislo_zmluvy || '-', 'mono'));
  metaCard.appendChild(kv('Rezort', d.rezort || '-'));
  metaCard.appendChild(kv('Zdroj', d.zdroj || '-'));
  if (d.crz_url) metaCard.appendChild(kvLink('CRZ odkaz', d.crz_url, d.crz_url));
  if (d.uvo_url && d.uvo_url.indexOf('http') === 0) metaCard.appendChild(kvLink('UVO odkaz', d.uvo_url, d.uvo_url));
  detailGrid.appendChild(metaCard);
  container.appendChild(detailGrid);

  // Poznámka / Popis
  if (d.poznamka || d.popis) {
    var textGrid = el('div', 'grid grid-2');
    if (d.poznamka) {
      var pozCard = card('Poznámka', null);
      pozCard.appendChild(el('div', null, d.poznamka));
      textGrid.appendChild(pozCard);
    }
    if (d.popis) {
      var popCard = card('Popis', null);
      popCard.appendChild(el('div', null, d.popis));
      textGrid.appendChild(popCard);
    }
    container.appendChild(textGrid);
  }

  // Prílohy
  if (d.prilohy && d.prilohy.length > 0) {
    container.appendChild(el('div', 'section-title', 'Prílohy (' + d.prilohy.length + ')'));
    var priCard = card(null, null);
    var priTable = el('table', 'mini-table');
    var priHead = document.createElement('thead');
    var priHr = document.createElement('tr');
    ['Názov', 'Súbor', 'Odkaz'].forEach(function(h) { priHr.appendChild(el('th', null, h)); });
    priHead.appendChild(priHr);
    priTable.appendChild(priHead);
    var priBody = document.createElement('tbody');
    d.prilohy.forEach(function(p) {
      var tr = document.createElement('tr');
      tr.appendChild(el('td', null, p.nazov || '-'));
      tr.appendChild(el('td', 'mono', p.subor || '-'));
      var linkTd = document.createElement('td');
      if (p.url) {
        var a = el('a', null, 'Stiahnuť PDF');
        a.href = p.url;
        a.target = '_blank';
        a.rel = 'noopener';
        linkTd.appendChild(a);
      }
      tr.appendChild(linkTd);
      priBody.appendChild(tr);
    });
    priTable.appendChild(priBody);
    priCard.appendChild(priTable);
    container.appendChild(priCard);
  }

  // Related contracts
  if (d.related_supplier_contracts && d.related_supplier_contracts.length > 0) {
    container.appendChild(el('div', 'section-title', 'Ďalšie zmluvy s rovnakým dodávateľom'));
    if (d.supplier_total_count) {
      var relStats = el('div', 'stat-row');
      var rs1 = el('div', 'stat-block info');
      rs1.appendChild(el('div', 'stat-value', String(d.supplier_total_count)));
      rs1.appendChild(el('div', 'stat-label', 'Celkom zmluv'));
      relStats.appendChild(rs1);
      var rs2 = el('div', 'stat-block accent');
      rs2.appendChild(el('div', 'stat-value', formatEur(d.supplier_total_sum)));
      rs2.appendChild(el('div', 'stat-label', 'Celková suma'));
      relStats.appendChild(rs2);
      container.appendChild(relStats);
    }
    var relCard = card(null, null);
    var relTable = el('table', 'mini-table');
    var relHead = document.createElement('thead');
    var relHr = document.createElement('tr');
    ['ID', 'Názov', 'Suma', 'Dátum', 'Typ'].forEach(function(h) { relHr.appendChild(el('th', null, h)); });
    relHead.appendChild(relHr);
    relTable.appendChild(relHead);
    var relBody = document.createElement('tbody');
    d.related_supplier_contracts.forEach(function(r) {
      var tr = document.createElement('tr');
      tr.style.cursor = 'pointer';
      tr.addEventListener('click', function() { window.location.href = '/browse/' + r.id; });
      var idTd = document.createElement('td');
      var idA = el('a', null, String(r.id));
      idA.href = '/browse/' + r.id;
      idTd.appendChild(idA);
      tr.appendChild(idTd);
      tr.appendChild(el('td', null, r.actual_subject || r.nazov_zmluvy || '-'));
      tr.appendChild(el('td', 'num', formatEur(r.suma)));
      tr.appendChild(el('td', null, formatDate(r.datum_zverejnenia)));
      var typTd = document.createElement('td');
      typTd.appendChild(el('span', 'tag ' + (r.typ === 'dodatok' ? 'tag-dodatok' : 'tag-zmluva'), r.typ || ''));
      tr.appendChild(typTd);
      relBody.appendChild(tr);
    });
    relTable.appendChild(relBody);
    relCard.appendChild(relTable);
    container.appendChild(relCard);
  }

  // Bottom spacer
  container.appendChild(el('div', null, ''));
  container.lastChild.style.height = '40px';
}

// Bug report
var _contractData = null;
function openBugReport() {
  var lines = [];
  lines.push('**Stránka:** ' + window.location.href);

  if (_contractData) {
    var d = _contractData;
    lines.push('**Zmluva ID:** ' + (d.id || ''));
    lines.push('**Názov:** ' + (d.nazov_zmluvy || ''));
    lines.push('**Dodávateľ:** ' + (d.dodavatel || ''));
    lines.push('**Objednávateľ:** ' + (d.objednavatel || ''));
    lines.push('**Suma:** ' + (d.suma != null ? d.suma + ' EUR' : ''));
  }

  lines.push('');
  lines.push('---');
  lines.push('**Popis chyby:**');
  lines.push('');

  var id = _contractData ? _contractData.id : getContractId();
  var title = encodeURIComponent('Chyba: Zmluva #' + id);
  var body = encodeURIComponent(lines.join('\n'));
  window.open('https://github.com/zltastopa/zmluvy/issues/new?title=' + title + '&body=' + body + '&labels=bug', '_blank');
  return false;
}

// Load
var contractId = getContractId();
fetch('/api/detail?id=' + encodeURIComponent(contractId))
  .then(function(res) { return res.json(); })
  .then(function(json) { _contractData = json.data || null; renderDetail(json); })
  .catch(function(err) {
    var container = document.getElementById('content');
    container.textContent = '';
    var errDiv = el('div', 'error-state');
    errDiv.appendChild(el('h2', null, 'Chyba pri načítavaní'));
    errDiv.appendChild(el('p', null, String(err)));
    container.appendChild(errDiv);
  });
</script>
